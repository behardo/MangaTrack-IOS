<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="MangaTrack"/>
  <meta name="theme-color" content="#0d0d0d"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>MangaTrack</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{-webkit-text-size-adjust:100%;height:100%}
    body{height:100%;background:#0d0d0d;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;overflow:hidden;-webkit-overflow-scrolling:touch}
    :root{
      --bg:#0d0d0d;--surface:#1a1a1a;--card:#1f1f1f;--border:#2a2a2a;
      --red:#c0392b;--redl:#e74c3c;--redd:#7b1d13;
      --text:#f0f0f0;--muted:#888;--dim:#444;
      --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
    }
    ::-webkit-scrollbar{display:none}
    input,textarea,button,select{font-family:inherit;-webkit-appearance:none;appearance:none}
    button{cursor:pointer;border:none;background:none;color:inherit}

    /* LAYOUT */
    #app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}
    #header{background:var(--surface);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 14px) 16px 10px;flex-shrink:0;transition:opacity .2s}
    #back-header{background:var(--surface);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 14px) 16px 10px;flex-shrink:0;display:none;align-items:center;gap:10px}
    #back-btn{color:var(--red);font-size:16px;padding:4px 0;font-weight:600}
    #back-title{font-weight:700;font-size:16px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .logo{font-weight:900;font-size:21px;color:var(--red);letter-spacing:1px}
    .logo span{color:var(--text)}
    .logo-sub{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:1px}
    #content{flex:1;overflow-y:auto;padding:14px 14px calc(var(--safe-bot) + 76px);-webkit-overflow-scrolling:touch}
    #navbar{background:var(--surface);border-top:1px solid var(--border);padding-bottom:calc(var(--safe-bot) + 2px);display:flex;flex-shrink:0;transition:transform .3s}

    /* NAV */
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 0 5px;color:var(--muted);font-size:9px;font-weight:500;gap:3px;transition:color .15s,transform .1s;active:transform:scale(.92)}
    .nav-item.active{color:var(--red);font-weight:700}
    .nav-item:active{transform:scale(.9)}
    .nav-icon{font-size:22px;line-height:1}

    /* CARDS */
    .card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px;transition:transform .15s,background .15s}
    .card-tap{cursor:pointer}
    .card-tap:active{transform:scale(.98);background:#252525}
    .section-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}

    /* INPUTS */
    input[type=text],input[type=number],input[type=search],input[type=email],input[type=password],textarea{
      background:var(--surface);border:1px solid var(--border);border-radius:12px;
      color:var(--text);padding:12px 14px;width:100%;font-size:15px;outline:none;
      transition:border-color .2s;
    }
    input:focus,textarea:focus{border-color:var(--red)}
    textarea{resize:none;line-height:1.5}
    input[type=range]{width:100%;accent-color:var(--red);height:4px}

    /* BUTTONS */
    .btn{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:14px;font-weight:600;transition:transform .1s,opacity .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
    .btn:active{transform:scale(.96)}
    .btn-primary{background:var(--red);color:#fff;border-color:var(--red)}
    .btn-primary:active{background:#a93226}
    .btn-danger{background:transparent;color:var(--redl);border-color:#e74c3c33}
    .btn-block{width:100%}

    /* BADGE */
    .badge{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid}
    .badge-sm{font-size:10px;padding:2px 8px}

    /* COVER */
    .cover{border-radius:8px;object-fit:cover;flex-shrink:0}
    .cover-ph{border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--redd);border:1px solid var(--red)}
    .cover-ph span{color:var(--red);font-weight:700}

    /* PROGRESS */
    .prog-bg{background:var(--border);border-radius:4px;height:4px;overflow:hidden;margin-top:6px}
    .prog-fill{background:var(--red);height:100%;border-radius:4px;transition:width .4s}

    /* TOAST */
    #toast{position:fixed;top:calc(var(--safe-top) + 16px);left:50%;transform:translateX(-50%) translateY(-8px);background:var(--red);color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:700;z-index:300;white-space:nowrap;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;box-shadow:0 4px 20px #0008}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* STATS */
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .stat-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px}
    .stat-label{font-size:11px;color:var(--muted);margin-bottom:4px}
    .stat-val{font-size:28px;font-weight:900;color:var(--red)}

    /* CHIPS */
    .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;-webkit-overflow-scrolling:touch}
    .chip{background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;transition:all .15s}
    .chip:active{transform:scale(.94)}
    .chip.active{background:var(--red);color:#fff;border-color:var(--red)}

    /* SORT */
    .sort-pills{display:flex;gap:6px;margin-bottom:12px}
    .sort-pill{background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:11px;font-weight:500;transition:all .15s}
    .sort-pill.active{background:var(--redd);color:var(--red);border-color:var(--red)}

    /* ROW */
    .manga-row{display:flex;gap:12px;align-items:flex-start}

    /* AUTH */
    #auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;z-index:200;gap:0}
    .auth-logo{font-weight:900;font-size:36px;color:var(--red);letter-spacing:2px;margin-bottom:4px}
    .auth-logo span{color:var(--text)}
    .auth-sub{font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:40px}
    .auth-card{background:var(--card);border-radius:18px;border:1px solid var(--border);padding:24px;width:100%;max-width:360px}
    .auth-tabs{display:flex;gap:0;margin-bottom:20px;background:var(--surface);border-radius:10px;padding:3px}
    .auth-tab{flex:1;padding:8px;font-size:13px;font-weight:600;border-radius:8px;color:var(--muted);transition:all .2s;text-align:center}
    .auth-tab.active{background:var(--red);color:#fff}
    .auth-field{margin-bottom:12px}
    .auth-field label{font-size:12px;color:var(--muted);margin-bottom:5px;display:block;font-weight:600}
    .divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:12px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .google-btn{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;width:100%;font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s}
    .google-btn:active{transform:scale(.97)}
    .auth-err{background:#e74c3c18;border:1px solid #e74c3c44;border-radius:10px;padding:10px 12px;font-size:13px;color:var(--redl);margin-bottom:12px;display:none}

    /* LOADER */
    #loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:400;flex-direction:column;gap:12px}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* EMPTY */
    .empty{color:var(--muted);text-align:center;padding:50px 0;font-size:14px}
    .empty-icon{font-size:48px;margin-bottom:14px;display:block}

    /* LEGEND */
    .legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
    .legend-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}

    /* TOGGLE */
    .toggle-track{width:50px;height:30px;border-radius:15px;background:var(--dim);position:relative;transition:background .25s;flex-shrink:0}
    .toggle-track.on{background:var(--red)}
    .toggle-thumb{width:24px;height:24px;border-radius:12px;background:#fff;position:absolute;top:3px;left:3px;transition:left .25s;box-shadow:0 1px 4px #0006}
    .toggle-track.on .toggle-thumb{left:23px}

    /* ANIMATIONS */
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .22s ease forwards}

    /* STATUS BUTTONS */
    .status-btn{border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid}
    .status-btn:active{transform:scale(.93)}
  </style>
</head>
<body>
<div id="loader"><div class="spinner"></div><span style="color:var(--muted);font-size:13px;">Caricamento...</span></div>

<div id="auth-screen" style="display:none">
  <div class="auth-logo">MANGA<span>TRACK</span></div>
  <div class="auth-sub">La tua libreria manga</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="setAuthTab('login')">Accedi</button>
      <button class="auth-tab" onclick="setAuthTab('register')">Registrati</button>
    </div>
    <div id="auth-err" class="auth-err"></div>
    <div class="auth-field"><label>Email</label><input type="email" id="auth-email" placeholder="email@esempio.com" autocomplete="email"/></div>
    <div class="auth-field"><label>Password</label><input type="password" id="auth-pass" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn btn-primary btn-block" id="auth-submit-btn" onclick="submitAuth()" style="margin-bottom:4px">Accedi</button>
    <div class="divider">oppure</div>
    <button class="google-btn" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.84l6.1-6.1C34.46 2.99 29.5 1 24 1 14.82 1 7.07 6.48 3.68 14.2l7.11 5.52C12.4 13.6 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.52 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.7c-.55 2.98-2.2 5.5-4.68 7.2l7.18 5.58C43.19 37.53 46.52 31.47 46.52 24.5z"/><path fill="#FBBC05" d="M10.79 28.28A14.56 14.56 0 0 1 9.5 24c0-1.49.26-2.93.72-4.28l-7.11-5.52A23.94 23.94 0 0 0 0 24c0 3.86.93 7.5 2.57 10.72l8.22-6.44z"/><path fill="#34A853" d="M24 47c5.5 0 10.12-1.82 13.49-4.94l-7.18-5.58C28.5 37.86 26.38 38.5 24 38.5c-6.26 0-11.6-4.1-13.21-9.72l-8.22 6.44C6.07 43.52 14.45 47 24 47z"/></svg>
      Continua con Google
    </button>
  </div>
</div>

<div id="app" style="display:none">
  <div id="header">
    <div class="logo">MANGA<span>TRACK</span></div>
    <div class="logo-sub">La tua libreria manga</div>
  </div>
  <div id="back-header">
    <button id="back-btn" onclick="closeDetail()">← Indietro</button>
    <span id="back-title"></span>
  </div>
  <div id="content"></div>
  <nav id="navbar">
    <button class="nav-item active" data-tab="home" onclick="switchTab('home')"><span class="nav-icon">⊞</span>Home</button>
    <button class="nav-item" data-tab="library" onclick="switchTab('library')"><span class="nav-icon">◫</span>Libreria</button>
    <button class="nav-item" data-tab="search" onclick="switchTab('search')"><span class="nav-icon">◎</span>Cerca</button>
    <button class="nav-item" data-tab="stats" onclick="switchTab('stats')"><span class="nav-icon">◈</span>Stats</button>
    <button class="nav-item" data-tab="settings" onclick="switchTab('settings')"><span class="nav-icon">◧</span>Impost.</button>
  </nav>
</div>

<div id="toast"></div>

<script>
// ─── SUPABASE ─────────────────────────────────────────────────────────────────
const SB_URL = "https://afkreberztrjuuhaifkr.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFma3JlYmVyenRyanV1aGFpZmtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NDk0MjksImV4cCI6MjA5NjEyNTQyOX0.wpiOO4AwT6HtY18o1e2DV8BbF46vWT8SIXxfunD3kA4";

let session = null;

async function sbFetch(path, opts={}) {
  const headers = { "apikey": SB_KEY, "Content-Type": "application/json", ...opts.headers };
  if (session?.access_token) headers["Authorization"] = "Bearer " + session.access_token;
  const r = await fetch(SB_URL + path, { ...opts, headers });
  if (!r.ok && r.status !== 204) {
    const e = await r.json().catch(()=>({}));
    throw new Error(e.error_description || e.message || e.msg || "Errore");
  }
  if (r.status === 204) return null;
  return r.json();
}

// AUTH
async function signUp(email, pass) {
  return sbFetch("/auth/v1/signup", { method:"POST", body: JSON.stringify({ email, password: pass }) });
}
async function signIn(email, pass) {
  return sbFetch("/auth/v1/token?grant_type=password", { method:"POST", body: JSON.stringify({ email, password: pass }) });
}
async function signInGoogle() {
  window.location.href = `${SB_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(location.origin)}`;
}
async function signOut() {
  await sbFetch("/auth/v1/logout", { method:"POST" }).catch(()=>{});
  session = null; localStorage.removeItem("mt_session");
}
async function refreshSession(refresh_token) {
  return sbFetch("/auth/v1/token?grant_type=refresh_token", { method:"POST", body: JSON.stringify({ refresh_token }) });
}

// DB
async function dbGet() {
  return sbFetch("/rest/v1/library?select=*&order=created_at.desc");
}
async function dbInsert(manga) {
  return sbFetch("/rest/v1/library", { method:"POST", headers:{ "Prefer":"return=representation" }, body: JSON.stringify({ ...manga, user_id: session.user.id }) });
}
async function dbUpdate(id, fields) {
  return sbFetch(`/rest/v1/library?id=eq.${id}`, { method:"PATCH", headers:{ "Prefer":"return=representation" }, body: JSON.stringify(fields) });
}
async function dbDelete(id) {
  return sbFetch(`/rest/v1/library?id=eq.${id}`, { method:"DELETE" });
}

// ─── STATE ────────────────────────────────────────────────────────────────────
const STATUS = ["In lettura","Completati","In pausa","Abbandonati","Da leggere"];
const SC = {"In lettura":"#e74c3c","Completati":"#27ae60","In pausa":"#f39c12","Abbandonati":"#7f8c8d","Da leggere":"#3498db"};
const GC = ["#e74c3c","#3498db","#27ae60","#f39c12","#9b59b6","#1abc9c","#e67e22","#2980b9"];

let library = [];
let tab = "home";
let detail = null;
let libFilter = "Tutti", libSort = "title", libSearch = "";
let searchQ = "", searchResults = [], searching = false, searchTimer = null;
let nsfwOn = false;
let authTab = "login";
let saving = false;

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  // check OAuth callback
  const hash = location.hash;
  if (hash.includes("access_token")) {
    const p = new URLSearchParams(hash.slice(1));
    session = { access_token: p.get("access_token"), refresh_token: p.get("refresh_token"), user: null };
    const u = await sbFetch("/auth/v1/user").catch(()=>null);
    if (u) { session.user = u; localStorage.setItem("mt_session", JSON.stringify(session)); }
    history.replaceState(null,"",location.pathname);
  }
  // restore session
  if (!session) {
    const saved = localStorage.getItem("mt_session");
    if (saved) {
      try {
        session = JSON.parse(saved);
        // try refresh
        const r = await refreshSession(session.refresh_token).catch(()=>null);
        if (r?.access_token) { session = { ...r, user: r.user }; localStorage.setItem("mt_session", JSON.stringify(session)); }
        else { session = null; localStorage.removeItem("mt_session"); }
      } catch { session = null; }
    }
  }
  hideLoader();
  if (session?.access_token) { showApp(); await loadLibrary(); }
  else showAuth();
}

function hideLoader() { document.getElementById("loader").style.display = "none"; }
function showAuth() { document.getElementById("auth-screen").style.display = "flex"; document.getElementById("app").style.display = "none"; }
function showApp() { document.getElementById("auth-screen").style.display = "none"; document.getElementById("app").style.display = "flex"; }

async function loadLibrary() {
  try { library = await dbGet() || []; } catch { library = []; }
  render();
}

// ─── AUTH UI ──────────────────────────────────────────────────────────────────
function setAuthTab(t) {
  authTab = t;
  document.querySelectorAll(".auth-tab").forEach(b => b.classList.toggle("active", b.textContent.toLowerCase().includes(t==="login"?"accedi":"registrati")));
  document.getElementById("auth-submit-btn").textContent = t === "login" ? "Accedi" : "Crea account";
  document.getElementById("auth-err").style.display = "none";
}
function showAuthErr(msg) { const e = document.getElementById("auth-err"); e.textContent = msg; e.style.display = "block"; }

async function submitAuth() {
  const email = document.getElementById("auth-email").value.trim();
  const pass = document.getElementById("auth-pass").value;
  if (!email || !pass) { showAuthErr("Compila tutti i campi"); return; }
  const btn = document.getElementById("auth-submit-btn");
  btn.textContent = "..."; btn.disabled = true;
  try {
    let data;
    if (authTab === "login") data = await signIn(email, pass);
    else data = await signUp(email, pass);
    if (data?.access_token) {
      session = { ...data, user: data.user }; localStorage.setItem("mt_session", JSON.stringify(session));
      showApp(); await loadLibrary();
    } else if (authTab === "register") {
      showAuthErr("Controlla la tua email per confermare l'account.");
    }
  } catch(e) { showAuthErr(e.message); }
  btn.textContent = authTab === "login" ? "Accedi" : "Crea account"; btn.disabled = false;
}
function loginGoogle() { signInGoogle(); }

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastT = null;
function toast(msg) {
  const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove("show"), 2200);
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function switchTab(t) {
  tab = t; detail = null;
  document.getElementById("header").style.display = "";
  document.getElementById("back-header").style.display = "none";
  document.getElementById("navbar").style.display = "";
  document.querySelectorAll(".nav-item").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));
  render();
}
function openDetail(id) {
  detail = library.find(m=>m.id===id); if(!detail) return;
  document.getElementById("header").style.display = "none";
  document.getElementById("back-header").style.display = "flex";
  document.getElementById("back-title").textContent = detail.title;
  document.getElementById("navbar").style.display = "none";
  renderDetail();
}
function closeDetail() {
  detail = null;
  document.getElementById("header").style.display = "";
  document.getElementById("back-header").style.display = "none";
  document.getElementById("navbar").style.display = "";
  render();
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function coverImg(m,size){
  const ph=`<div class="cover-ph" style="width:${size}px;height:${Math.round(size*1.4)}px;"><span style="font-size:${Math.round(size*.28)}px;">${(m.title||"??").trim().split(" ").slice(0,2).map(w=>w[0]||"").join("").toUpperCase()}</span></div>`;
  if(!m.cover)return ph;
  return `<img src="${esc(m.cover)}" class="cover" style="width:${size}px;height:${Math.round(size*1.4)}px;" onerror="this.outerHTML='${ph.replace(/'/g,"&#39;")}'" loading="lazy">`;
}
function bdg(s,sm=false){const c=SC[s]||"#888";return `<span class="badge${sm?" badge-sm":""}" style="background:${c}22;color:${c};border-color:${c}55;">${s}</span>`}
function starEl(sc){const c=sc>=8?"#f1c40f":sc>=6?"#e67e22":"#888";return `<span style="font-size:12px;font-weight:700;color:${c};">★ ${sc}/10</span>`}
function pct(m){return m.total_chapters?Math.min(100,Math.round((m.chapters/m.total_chapters)*100)):0}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  if(detail){renderDetail();return}
  const c=document.getElementById("content");
  const map={home:renderHome,library:renderLibrary,search:renderSearch,stats:renderStats,settings:renderSettings};
  c.innerHTML=`<div class="fade-in">${(map[tab]||renderHome)()}</div>`;
}

// HOME
function renderHome(){
  const tot=library.length, chaps=library.reduce((a,m)=>a+m.chapters,0);
  const sc=library.filter(m=>m.score>0), avg=sc.length?(sc.reduce((a,m)=>a+m.score,0)/sc.length).toFixed(1):"—";
  const favs=library.filter(m=>m.favourite);
  const recent=library.slice(0,5);
  let h=`<div class="stat-grid">
    ${[["Manga totali",tot],["Capitoli",chaps.toLocaleString()],["Voto medio",avg],["Preferiti",favs.length]].map(([l,v])=>`<div class="stat-card"><div class="stat-label">${l}</div><div class="stat-val">${v}</div></div>`).join("")}
  </div>`;
  if(library.length===0){h+=`<div class="empty"><span class="empty-icon">◫</span>Nessun manga nella libreria.<br>Cerca qualcosa nella tab Cerca!</div>`;return h}
  h+=`<div class="card"><div class="section-label">Aggiunti di recente</div>`;
  recent.forEach(m=>{h+=`<div class="card-tap" onclick="openDetail('${m.id}')" style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);">
    ${coverImg(m,38)}
    <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(m.title)}</div><div style="font-size:11px;color:var(--muted);margin-top:1px;">${esc(m.genre||"")}</div></div>
    ${bdg(m.status,true)}
  </div>`});
  h+=`</div>`;
  if(favs.length){
    h+=`<div class="card"><div class="section-label">★ Preferiti</div>`;
    favs.forEach(m=>{h+=`<div class="card-tap" onclick="openDetail('${m.id}')" style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
      ${coverImg(m,34)}
      <span style="flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(m.title)}</span>
      ${m.score>0?starEl(m.score):""}
    </div>`});
    h+=`</div>`;
  }
  return h;
}

// LIBRARY
function renderLibrary(){
  let list=library.filter(m=>libFilter==="Tutti"||m.status===libFilter).filter(m=>m.title.toLowerCase().includes(libSearch.toLowerCase()));
  if(libSort==="title")list.sort((a,b)=>a.title.localeCompare(b.title));
  if(libSort==="score")list.sort((a,b)=>b.score-a.score);
  if(libSort==="chapters")list.sort((a,b)=>b.chapters-a.chapters);
  if(libSort==="added")list.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  let h=`<input type="search" value="${esc(libSearch)}" placeholder="🔍 Cerca nella libreria..." oninput="libSearch=this.value;render()" style="margin-bottom:10px;">
  <div class="chips"><button class="chip${libFilter==="Tutti"?" active":""}" onclick="libFilter='Tutti';render()">Tutti (${library.length})</button>`;
  STATUS.forEach(s=>{const n=library.filter(m=>m.status===s).length;if(n>0)h+=`<button class="chip${libFilter===s?" active":""}" onclick="libFilter='${s}';render()" style="${libFilter===s?`background:${SC[s]};border-color:${SC[s]};color:#fff;`:""}">${s} (${n})</button>`});
  h+=`</div><div class="sort-pills">`;
  [["title","A-Z"],["score","Voto"],["chapters","Cap."],["added","Data"]].forEach(([v,l])=>{h+=`<button class="sort-pill${libSort===v?" active":""}" onclick="libSort='${v}';render()">${l}</button>`});
  h+=`</div>`;
  if(!list.length){h+=`<div class="empty"><span class="empty-icon">◫</span>Nessun manga trovato</div>`;return h}
  list.forEach(m=>{h+=`<div class="card card-tap" onclick="openDetail('${m.id}')"><div class="manga-row">
    ${coverImg(m,54)}
    <div style="flex:1;min-width:0;">
      <div style="font-weight:800;font-size:14px;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(m.title)}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:5px;">${bdg(m.status,true)}${m.score>0?starEl(m.score):""}</div>
      <div style="font-size:11px;color:var(--muted);">${m.chapters} cap.${m.total_chapters?` / ${m.total_chapters}`:""}</div>
      ${m.total_chapters?`<div class="prog-bg"><div class="prog-fill" style="width:${pct(m)}%;"></div></div>`:""}
    </div>
    ${m.favourite?`<span style="color:#f1c40f;font-size:18px;flex-shrink:0;align-self:center;">★</span>`:""}
  </div></div>`});
  return h;
}

// SEARCH
function renderSearch(){
  let h=`<div style="font-weight:800;font-size:18px;margin-bottom:12px;color:var(--red);">Cerca Online</div>
  <input type="search" id="online-search" value="${esc(searchQ)}" placeholder="Cerca su MyAnimeList..." oninput="onSQ(this.value)" style="margin-bottom:12px;">`;
  if(searching)h+=`<div class="empty">🔍 Ricerca in corso...</div>`;
  else if(!searchQ.trim())h+=`<div class="empty"><span class="empty-icon">◎</span>Cerca qualsiasi manga<br>su MyAnimeList</div>`;
  else if(!searchResults.length)h+=`<div class="empty">Nessun risultato per "${esc(searchQ)}"</div>`;
  else searchResults.forEach(m=>{
    const title=m.title_english||m.title;
    const img=m.images?.jpg?.image_url||"";
    const genres=(m.genres||[]).slice(0,2).map(g=>g.name).join(", ");
    const inLib=library.some(x=>x.title===title);
    h+=`<div class="card"><div class="manga-row">
      ${img?`<img src="${esc(img)}" class="cover" style="width:54px;height:76px;" loading="lazy">`:`<div class="cover-ph" style="width:54px;height:76px;"><span style="font-size:15px;">${title.slice(0,2).toUpperCase()}</span></div>`}
      <div style="flex:1;min-width:0;">
        <div style="font-weight:800;font-size:13px;margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${esc(title)}</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:5px;">${genres}${m.chapters?` · ${m.chapters} cap.`:""}</div>
        ${m.score?`<div style="font-size:11px;color:#f1c40f;margin-bottom:7px;">★ ${m.score}</div>`:""}
        ${inLib?`<span style="font-size:12px;color:var(--muted);">✓ In libreria</span>`:`<button class="btn btn-primary" style="padding:7px 14px;font-size:12px;" onclick="addManga(${m.mal_id})">+ Aggiungi</button>`}
      </div>
    </div></div>`;
  });
  return h;
}

function onSQ(v){
  searchQ=v; clearTimeout(searchTimer);
  if(!v.trim()){searchResults=[];render();return}
  searching=true;render();
  searchTimer=setTimeout(()=>{
    fetch(`https://api.jikan.moe/v4/manga?q=${encodeURIComponent(v)}&limit=10`)
      .then(r=>r.json()).then(d=>{searchResults=d.data||[];searching=false;render()})
      .catch(()=>{searchResults=[];searching=false;render()});
  },420);
}

async function addManga(malId){
  const m=searchResults.find(r=>r.mal_id===malId);if(!m)return;
  const title=m.title_english||m.title;
  if(library.some(x=>x.title===title)){toast("Già in libreria!");return}
  const manga={title,status:"Da leggere",chapters:0,total_chapters:m.chapters||null,score:0,genre:m.genres?.[0]?.name||"Action",cover:m.images?.jpg?.image_url||null,favourite:false,review:""};
  try{
    const res=await dbInsert(manga);
    library.unshift(res[0]||{...manga,id:Date.now()});
    toast(`"${title}" aggiunto!`);render();
  }catch(e){toast("Errore: "+e.message)}
}

// STATS
function renderStats(){
  const tot=library.length,chaps=library.reduce((a,m)=>a+m.chapters,0);
  const sc=library.filter(m=>m.score>0),avg=sc.length?(sc.reduce((a,m)=>a+m.score,0)/sc.length).toFixed(1):"—";
  const byStatus=STATUS.map(s=>({label:s,val:library.filter(m=>m.status===s).length,color:SC[s]})).filter(x=>x.val>0);
  const gm={};library.forEach(m=>{gm[m.genre]=(gm[m.genre]||0)+1});
  const byGenre=Object.entries(gm).map(([l,v],i)=>({label:l,val:v,color:GC[i%GC.length]})).sort((a,b)=>b.val-a.val).slice(0,6);
  let h=`<div style="font-weight:800;font-size:18px;margin-bottom:14px;color:var(--red);">Statistiche</div>
  <div class="stat-grid">${[["Totale manga",tot],["Capitoli",chaps.toLocaleString()],["Voto medio",avg],["Preferiti",library.filter(m=>m.favourite).length]].map(([l,v])=>`<div class="stat-card"><div class="stat-label">${l}</div><div class="stat-val">${v}</div></div>`).join("")}</div>`;
  if(byStatus.length)h+=donutCard("Distribuzione stati",byStatus);
  if(byGenre.length)h+=donutCard("Generi più letti",byGenre);
  return h;
}

function donutCard(title,data){
  const tot=data.reduce((a,d)=>a+d.val,0);if(!tot)return"";
  const size=120,r=40,cx=60,cy=60;
  let off=0,paths="";
  data.forEach(d=>{
    const p=d.val/tot,a1=off*2*Math.PI-Math.PI/2,a2=(off+p)*2*Math.PI-Math.PI/2;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    paths+=`<path d="M${cx} ${cy} L${x1} ${y1} A${r} ${r} 0 ${p>.5?1:0} 1 ${x2} ${y2} Z" fill="${d.color}" opacity=".85"/>`;
    off+=p;
  });
  const legend=data.map(d=>`<div class="legend-row"><div class="legend-dot" style="background:${d.color}"></div><span style="font-size:11px;flex:1;">${esc(d.label)}</span><span style="font-size:12px;font-weight:700;color:${d.color};">${d.val}</span></div>`).join("");
  return `<div class="card"><div class="section-label">${title}</div><div style="display:flex;align-items:center;gap:16px;"><svg width="${size}" height="${size}" style="flex-shrink:0;">${paths}<circle cx="${cx}" cy="${cy}" r="22" fill="var(--card)"/><text x="${cx}" y="${cy+5}" text-anchor="middle" fill="var(--text)" font-size="14" font-weight="700">${tot}</text></svg><div style="flex:1;">${legend}</div></div></div>`;
}

// SETTINGS
function renderSettings(){
  const email=session?.user?.email||"";
  return `<div style="font-weight:800;font-size:18px;margin-bottom:14px;color:var(--red);">Impostazioni</div>
  <div class="card" style="margin-bottom:10px;">
    <div class="section-label">Account</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px;">Connesso come <strong style="color:var(--text);">${esc(email)}</strong></div>
    <button class="btn btn-danger btn-block" onclick="doLogout()">Esci dall'account</button>
  </div>
  <div class="card" style="display:flex;align-items:center;justify-content:space-between;">
    <div><div style="font-weight:700;font-size:14px;">Filtro NSFW</div><div style="font-size:12px;color:var(--muted);margin-top:2px;">Nasconde contenuti espliciti</div></div>
    <div class="toggle-track${nsfwOn?" on":""}" onclick="nsfwOn=!nsfwOn;render()"><div class="toggle-thumb"></div></div>
  </div>
  <div class="card">
    <div style="font-weight:700;font-size:14px;margin-bottom:4px;">Esporta libreria</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Scarica un backup in JSON</div>
    <button class="btn btn-primary" onclick="exportLib()">⬇ Esporta JSON</button>
  </div>
  <div class="card"><div style="font-size:12px;color:var(--muted);">MangaTrack v2.0 · Jikan API v4 · Supabase</div></div>`;
}

async function doLogout(){
  await signOut(); library=[];
  document.getElementById("app").style.display="none";
  document.getElementById("auth-screen").style.display="flex";
}
function exportLib(){
  const a=document.createElement("a");
  a.href="data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify({library,exported:new Date().toISOString()},null,2));
  a.download="mangatrack_backup.json";a.click();
}

// DETAIL
function renderDetail(){
  const m=detail;
  document.getElementById("back-title").textContent=m.title;
  const statusBtns=STATUS.map(s=>{
    const c=SC[s],active=m.status===s;
    return `<button class="status-btn" onclick="setDF('status','${s}')" style="background:${active?c+"44":c+"11"};color:${c};border-color:${active?c:c+"44"};">${s}</button>`;
  }).join("");
  document.getElementById("content").innerHTML=`<div class="fade-in">
  <div style="display:flex;gap:14px;margin-bottom:16px;">
    ${coverImg(m,84)}
    <div style="flex:1;">
      <div style="font-weight:800;font-size:16px;margin-bottom:6px;line-height:1.3;">${esc(m.title)}</div>
      <div style="margin-bottom:6px;">${bdg(m.status)}</div>
      <div style="font-size:12px;color:var(--muted);">${esc(m.genre||"")}</div>
    </div>
  </div>
  <div class="card"><div class="section-label">Stato</div><div style="display:flex;flex-wrap:wrap;gap:7px;">${statusBtns}</div></div>
  <div class="card">
    <div class="section-label">Progresso</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:${m.total_chapters?"10px":"0"};">
      <span style="font-size:13px;color:var(--muted);flex-shrink:0;">Capitoli letti</span>
      <input type="number" min="0" id="d-ch" value="${m.chapters}" onchange="setDF('chapters',parseInt(this.value)||0)" style="width:80px;text-align:center;">
      ${m.total_chapters?`<span style="color:var(--muted);font-size:13px;">/ ${m.total_chapters}</span>`:""}
    </div>
    ${m.total_chapters?`<div class="prog-bg"><div class="prog-fill" id="d-prog" style="width:${pct(m)}%;"></div></div>`:""}
  </div>
  <div class="card">
    <div class="section-label">Voto</div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="d-sv" style="font-size:24px;color:#f1c40f;font-weight:900;min-width:30px;">${m.score||"—"}</span>
      <input type="range" min="0" max="10" step="1" id="d-score" value="${m.score}" oninput="setDF('score',parseInt(this.value));document.getElementById('d-sv').textContent=this.value||'—'">
      <span style="color:var(--muted);font-size:12px;">/10</span>
    </div>
  </div>
  <div class="card">
    <div class="section-label">Recensione</div>
    <textarea id="d-rev" rows="3" placeholder="Scrivi qualcosa..." onchange="setDF('review',this.value)">${esc(m.review||"")}</textarea>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:10px;">
    <button class="btn${m.favourite?" btn-primary":""} btn-block" onclick="setDF('favourite',${!m.favourite});renderDetail()">
      ${m.favourite?"★ Preferito":"☆ Aggiungi ai preferiti"}
    </button>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:20px;">
    <button class="btn btn-primary" style="flex:2;" onclick="saveDetail()" id="save-btn">Salva</button>
    <button class="btn btn-danger" style="flex:1;" onclick="deleteDetail()">Rimuovi</button>
  </div></div>`;
}

function setDF(k,v){detail[k]=v;if(k==="chapters"&&detail.total_chapters){const el=document.getElementById("d-prog");if(el)el.style.width=pct(detail)+"%"}}

async function saveDetail(){
  const btn=document.getElementById("save-btn");
  if(btn){btn.textContent="...";btn.disabled=true}
  try{
    const fields={status:detail.status,chapters:detail.chapters,score:detail.score,review:detail.review,favourite:detail.favourite};
    await dbUpdate(detail.id,fields);
    const idx=library.findIndex(m=>m.id===detail.id);
    if(idx>-1)library[idx]={...library[idx],...fields};
    toast("Salvato!");
  }catch(e){toast("Errore: "+e.message)}
  if(btn){btn.textContent="Salva";btn.disabled=false}
}

async function deleteDetail(){
  try{
    await dbDelete(detail.id);
    library=library.filter(m=>m.id!==detail.id);
    closeDetail();toast("Rimosso dalla libreria.");
  }catch(e){toast("Errore: "+e.message)}
}

// ─── START ────────────────────────────────────────────────────────────────────
init();
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js")</script>
</body>
